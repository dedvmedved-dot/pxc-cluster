<title>role4</title>
<polygon fill="#e6f4ea" stroke="black" points="245.56,-161.25 64.52,-161.25 64.52,-81.25 245.56,-81.25 245.56,-161.25"/>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-148.25" font-family="Arial" font-size="10.00">Роль 4: Настройка SST</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-136.25" font-family="Arial" font-size="10.00">- Создание sstuser</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-124.25" font-family="Arial" font-size="10.00">- GRANT RELOAD, LOCK TABLES,</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-112.25" font-family="Arial" font-size="10.00">  PROCESS, REPLICATION CLIENT</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-100.25" font-family="Arial" font-size="10.00">- Пароль: SstPass123</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-88.25" font-family="Arial" font-size="10.00">- Доступ с 192.168.122.%</text>
</g>
