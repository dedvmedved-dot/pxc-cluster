<svg width="318pt" height="676pt" viewBox="0.00 0.00 318.00 676.00" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<g id="graph0" class="graph" transform="scale(1 1) rotate(0) translate(4 672.11)">
<title>AnsibleFlow</title>
<polygon fill="white" stroke="none" points="-4,4 -4,-672.11 314.08,-672.11 314.08,4 -4,4"/>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-647.91" font-family="Arial" font-size="18.00">Настройка кластера через Ansible</text>
<!-- start -->
<g id="node1" class="node">
<title>start</title>
<ellipse fill="#e8f0fe" stroke="black" cx="155.04" cy="-615.88" rx="64.38" ry="22.63"/>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-618.88" font-family="Arial" font-size="10.00">ansible-playbook</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-606.88" font-family="Arial" font-size="10.00">deploy.yml</text>
</g>
<!-- role1 -->
<g id="node2" class="node">
<title>role1</title>
<polygon fill="#e6f4ea" stroke="black" points="245.84,-557.25 64.24,-557.25 64.24,-477.25 245.84,-477.25 245.84,-557.25"/>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-544.25" font-family="Arial" font-size="10.00">Роль 1: Установка</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-532.25" font-family="Arial" font-size="10.00">- Добавление репозитория Percona</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-520.25" font-family="Arial" font-size="10.00">- percona-release setup pxc-80</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-508.25" font-family="Arial" font-size="10.00">- apt install percona-xtradb-cluster</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-496.25" font-family="Arial" font-size="10.00">- Установка xtrabackup</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-484.25" font-family="Arial" font-size="10.00">- Установка socat</text>
</g>
<!-- start&#45;&gt;role1 -->
<g id="edge1" class="edge">
<title>start-&gt;role1</title>
<path fill="none" stroke="black" d="M155.04,-592.76C155.04,-592.76 155.04,-569.13 155.04,-569.13"/>
<polygon fill="black" stroke="black" points="158.54,-569.13 155.04,-559.13 151.54,-569.13 158.54,-569.13"/>
</g>
<!-- role2 -->
<g id="node3" class="node">
<title>role2</title>
<polygon fill="#e6f4ea" stroke="black" points="230.84,-441.25 79.24,-441.25 79.24,-325.25 230.84,-325.25 230.84,-441.25"/>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-428.25" font-family="Arial" font-size="10.00">Роль 2: Конфигурация</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-416.25" font-family="Arial" font-size="10.00">- Шаблон /etc/mysql/my.cnf</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-404.25" font-family="Arial" font-size="10.00">  с Jinja2-переменными</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-392.25" font-family="Arial" font-size="10.00">- wsrep-cluster-address</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-380.25" font-family="Arial" font-size="10.00">  зависит от имени хоста</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-368.25" font-family="Arial" font-size="10.00">- wsrep-node-address</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-356.25" font-family="Arial" font-size="10.00">  разный для каждой ноды</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-344.25" font-family="Arial" font-size="10.00">- Отключение SSL для Galera</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-332.25" font-family="Arial" font-size="10.00">  (socket.ssl=false)</text>
</g>
<!-- role1&#45;&gt;role2 -->
<g id="edge2" class="edge">
<title>role1-&gt;role2</title>
