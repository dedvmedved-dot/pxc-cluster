<polygon fill="black" stroke="black" points="158.54,-452.78 155.04,-442.78 151.54,-452.78 158.54,-452.78"/>
</g>
<!-- role3 -->
<g id="node4" class="node">
<title>role3</title>
<polygon fill="#e6f4ea" stroke="black" points="230.42,-289.25 79.66,-289.25 79.66,-197.25 230.42,-197.25 230.42,-289.25"/>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-276.25" font-family="Arial" font-size="10.00">Роль 3: Запуск</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-264.25" font-family="Arial" font-size="10.00">- pxc-node1: bootstrap</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-252.25" font-family="Arial" font-size="10.00">  WSREP_NEW_CLUSTER=1</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-240.25" font-family="Arial" font-size="10.00">- pxc-node2: подключение</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-228.25" font-family="Arial" font-size="10.00">  к pxc-node1</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-216.25" font-family="Arial" font-size="10.00">- pxc-node3: подключение</text>
<text xml:space="preserve" text-anchor="middle" x="155.04" y="-204.25" font-family="Arial" font-size="10.00">  к pxc-node1 и pxc-node2</text>
</g>
<!-- role2&#45;&gt;role3 -->
<g id="edge3" class="edge">
<title>role2-&gt;role3</title>
<path fill="none" stroke="black" d="M155.04,-325.1C155.04,-325.1 155.04,-301.02 155.04,-301.02"/>
<polygon fill="black" stroke="black" points="158.54,-301.02 155.04,-291.02 151.54,-301.02 158.54,-301.02"/>
</g>
